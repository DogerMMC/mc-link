<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { user-select: none; overflow: hidden; background: transparent; }
:root { --bg: rgba(30, 30, 46, 0.85); --text: rgba(255,255,255,0.9); }
@media (prefers-color-scheme: dark) {
  :root { --hover: rgba(255,255,255,0.10); }
}
@media (prefers-color-scheme: light) {
  :root { --bg: rgba(240, 242, 245, 0.85); --text: rgba(0,0,0,0.85); --hover: rgba(0,0,0,0.07); }
}
.menu {
  background: var(--bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 4px 0;
  min-width: 170px;
  border-radius: 4px;
}

@media (prefers-color-scheme: dark) {
  .menu {
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 4px 16px rgba(0,0,0,0.3);
  }
}

@media (prefers-color-scheme: light) {
  .menu {
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.08);
  }
}

.item {
  width: 100%; border: none; background: var(--bg);
  color: var(--text); padding: 6px 12px;
  font-size: 13px; display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.item:hover:not(:disabled) { background: var(--hover); }
.item:disabled { opacity: 0.35; cursor: default; }
.icon { width: 14px; height: 14px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="menu" class="menu">
  <button id="openBtn" class="item">
    <img src="mc-link-icon.png" class="icon" alt="">
    打开 MC Link
  </button>
  <button id="stopBtn" class="item" style="display:none">
    <svg class="icon" viewBox="0 0 16 16" fill="currentColor">
      <path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5"/>
    </svg>
    停止联机
  </button>
  <button id="exitBtn" class="item">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
      <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    退出主程序
  </button>
</div>

<script>
const invoke = window.__TAURI_INTERNALS__.invoke;

invoke('get_latency').then(ms => {
  const btn = document.getElementById('stopBtn');
  if (ms > 0) btn.style.display = 'flex';
}).finally(() => {
  const height = document.getElementById('menu').offsetHeight;
  invoke('set_tray_size', { width: 180, height });
});

document.getElementById('openBtn').addEventListener('click', () => {
  invoke('show_main_window');
});

document.getElementById('stopBtn').addEventListener('click', () => {
  invoke('stop_online');
  window.close();
});

document.getElementById('exitBtn').addEventListener('click', () => {
  invoke('exit_app');
});
</script>
</body>
</html>
