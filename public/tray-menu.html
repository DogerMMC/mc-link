<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e2e; user-select: none; overflow: hidden; }
.menu { background: #1e1e2e; padding: 4px 0; min-width: 170px; }
.item {
  width: 100%; border: none; background: transparent;
  color: rgba(255, 255, 255, 0.9); padding: 6px 12px;
  font-size: 13px; display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.item:hover:not(:disabled) { background: rgba(255, 255, 255, 0.08); }
.item:disabled { opacity: 0.35; cursor: default; }
.icon { width: 14px; height: 14px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="menu">
  <button id="openBtn" class="item">
    <img src="mc-link-icon.png" class="icon" alt="">
    打开 MC Link
  </button>
  <button id="stopBtn" class="item" style="display:none">
    <svg class="icon" viewBox="0 0 16 16" fill="currentColor">
      <path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5"/>
    </svg>
    停止联机
  </button>
  <button id="exitBtn" class="item">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
      <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    退出主程序
  </button>
</div>

<script>
const invoke = window.__TAURI_INTERNALS__.invoke;

invoke('get_latency').then(ms => {
  const btn = document.getElementById('stopBtn');
  if (ms > 0) btn.style.display = 'flex';
});

document.getElementById('openBtn').addEventListener('click', () => {
  invoke('show_main_window');
});

document.getElementById('stopBtn').addEventListener('click', () => {
  invoke('stop_online');
  window.close();
});

document.getElementById('exitBtn').addEventListener('click', () => {
  invoke('exit_app');
});
</script>
</body>
</html>
